async function loadShared(){

  if(!sbCl||!TG_UID){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--hn)">'+(L==="ru"?"Открой через Telegram":"Open via Telegram")+'</div>';return;}
  try{
    var mRes=await sbCl.from('shared_members').select('goal_id').eq('user_id',TG_UID).eq('status','active');
    var ids=(mRes.data||[]).map(function(m){return m.goal_id});
    if(!ids.length){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--hn);line-height:1.6">'+(L==="ru"?"Нет совместных целей.<br>Создай первую!":"No shared goals yet.<br>Create your first!")+'</div>';return;}
    var gRes=await sbCl.from('shared_goals').select('*').in('id',ids);
    var goals=gRes.data||[];
    renderSharedList(goals);checkSharedDeadlines(goals);
  }catch(e){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--hn)">'+esc(e.message||'Ошибка')+'</div>';}
}

function renderSharedList(goals){
  var el=document.getElementById('sharedList');
  if(!goals.length){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--hn)">'+(L==="ru"?"Нет совместных целей":"No shared goals")+'</div>';return;}
  var h='';
  goals.forEach(function(g){
    var dl=sgDaysTo(g.deadline);
    h+='<div class="cd" style="cursor:pointer;margin:0 16px 8px" onclick="openSharedDetail('+g.id+')">';
    h+='<div class="ci" style="display:flex;justify-content:space-between;align-items:flex-start">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:600">'+esc(g.title)+'</div>';
    if(g.deadline)h+='<div style="font-size:12px;color:'+(dl<=0?'#ef4444':dl<=7?'var(--gd)':'var(--hn)')+';margin-top:3px">📅 '+sgDlStr(g.deadline)+'</div>';
    h+='</div><span style="font-size:28px;margin-left:8px">'+tmplIcon(g.template)+'</span>';
    h+='</div></div>';
  });
  el.innerHTML=h;
}

function checkSharedDeadlines(goals){
  var b='';
  goals.forEach(function(g){
    if(!g.deadline)return;
    var dl=sgDaysTo(g.deadline);
    if(dl===7||dl===1||dl===0){
      var msg=dl===0?(L==="ru"?"Сегодня дедлайн: ":"Deadline today: "):dl===1?(L==="ru"?"Завтра дедлайн: ":"Deadline tomorrow: "):(L==="ru"?"Через 7 дней: ":"In 7 days: ");
      b+='<div class="lt" style="border-color:'+(dl===0?'#ef4444':'var(--gd)')+'"><div style="font-size:13px;font-weight:600">⏰ '+msg+esc(g.title)+'</div></div>';
    }
  });
  var el=document.getElementById('sharedDeadlineBanner');if(el)el.innerHTML=b;
}

async function saveSharedGoal(){
  var title=document.getElementById('sgTitle').value.trim();
  if(!title){try{TG.showAlert(L==="ru"?"Введи название":"Enter title")}catch(e){alert(L==="ru"?"Введи название":"Enter title")}return;}
  if(!TG_UID)return;
  var code=genCode(),deadline=document.getElementById('sgDeadline').value||null;
  var uname='';
  try{var uRes=await sbCl.from('bot_users').select('username,first_name').eq('user_id',TG_UID).single();uname=(uRes.data&&uRes.data.username)||''}catch(e){}
  try{
    var ins=await sbCl.from('shared_goals').insert({title:title,cat:fCat,hz:fHz,created_by:TG_UID,invite_code:code,deadline:deadline,template:_sgTmpl}).select().single();
    if(ins.error)throw ins.error;
    var goalId=ins.data.id;
    await sbCl.from('shared_members').insert({goal_id:goalId,user_id:TG_UID,username:uname,role:'creator',status:'active'});
    await sbCl.from('shared_stats').insert({goal_id:goalId,user_id:TG_UID,tasks_created:0,tasks_done:0,encouragements_sent:0,days_active:0});
    X('createSharedOv');showInviteCode(code,title);loadShared();hap('medium');
  }catch(e){try{TG.showAlert(L==="ru"?"Ошибка создания":"Create error")}catch(e2){alert(L==="ru"?"Ошибка":"Error")};}
}

function openJoinShared(){document.getElementById('sgJoinCode').value='';document.getElementById('joinSharedOv').classList.add('open')}

async function joinSharedGoal(){
  var code=document.getElementById('sgJoinCode').value.trim().toUpperCase();
  if(code.length!==8){try{TG.showAlert(L==="ru"?"Код — 8 символов":"Code must be 8 chars")}catch(e){alert("8 chars")};return;}
  if(!TG_UID)return;
  try{
    var gRes=await sbCl.from('shared_goals').select('*').eq('invite_code',code).single();
    if(gRes.error||!gRes.data){try{TG.showAlert(L==="ru"?"Цель не найдена":"Goal not found")}catch(e){alert("Not found")};return;}
    var g=gRes.data;
    var mRes=await sbCl.from('shared_members').select('id').eq('goal_id',g.id).eq('user_id',TG_UID);
    if(mRes.data&&mRes.data.length){X('joinSharedOv');setTimeout(function(){openSharedDetail(g.id)},200);return;}
    var uname='';
    try{var uRes=await sbCl.from('bot_users').select('username').eq('user_id',TG_UID).single();uname=(uRes.data&&uRes.data.username)||''}catch(e){}
    await sbCl.from('shared_members').insert({goal_id:g.id,user_id:TG_UID,username:uname,role:'member',status:'active'});
    await sbCl.from('shared_stats').insert({goal_id:g.id,user_id:TG_UID,tasks_created:0,tasks_done:0,encouragements_sent:0,days_active:0});
    X('joinSharedOv');hap('medium');loadShared();setTimeout(function(){openSharedDetail(g.id)},300);
  }catch(e){try{TG.showAlert(L==="ru"?"Ошибка":"Error")}catch(e2){alert("Error")}}
}

async function renderSharedDetail(goalId){
  try{
    var results=await Promise.all([
      sbCl.from('shared_goals').select('*').eq('id',goalId).single(),
      sbCl.from('shared_members').select('*').eq('goal_id',goalId).eq('status','active'),
      sbCl.from('shared_tasks').select('*').eq('goal_id',goalId).order('done',{ascending:true}).order('created_at',{ascending:true}),
      sbCl.from('shared_stats').select('*').eq('goal_id',goalId)
    ]);
    var g=results[0].data,members=results[1].data||[],tasks=results[2].data||[],stats=results[3].data||[];
    if(!g){document.getElementById('sgDtlBody').innerHTML='<div style="padding:32px;text-align:center;color:#ef4444">'+(L==="ru"?"Цель не найдена":"Not found")+'</div>';return;}
    var isCreator=g.created_by===TG_UID;
    var doneTasks=tasks.filter(function(t){return t.done}).length;
    var pct=tasks.length?Math.round(doneTasks/tasks.length*100):0;
    var ranked=stats.slice().sort(function(a,b){return(b.tasks_done||0)-(a.tasks_done||0)});
    var medals=['🥇','🥈','🥉'];
    var memberMap={};members.forEach(function(m){memberMap[m.user_id]=m});
    var totalDone=stats.reduce(function(acc,st){return acc+(st.tasks_done||0)},0);
    var h='<div style="padding:16px 0 8px">';
    h+='<div style="font-size:22px;font-weight:700;margin-bottom:4px">'+esc(g.title)+'</div>';
    if(g.deadline){var dl=sgDaysTo(g.deadline);h+='<div style="font-size:13px;color:'+(dl<=0?'#ef4444':dl<=7?'var(--gd)':'var(--hn)')+'">📅 '+sgDlStr(g.deadline)+'</div>';}
    h+='<div style="display:flex;align-items:center;gap:8px;margin-top:12px"><div class="lvb" style="flex:1;height:8px"><div class="lvf" style="width:'+pct+'%;background:var(--lk)"></div></div><span style="font-size:13px;color:var(--hn);white-space:nowrap">'+doneTasks+'/'+tasks.length+'</span></div></div>';
    // Members
    if(ranked.length){
      var nM2=ranked.filter(function(st){return memberMap[st.user_id]}).length;
      if(totalDone>0&&nM2>0){
        var xStep2=Math.floor(280/nM2),bW2=Math.min(50,xStep2-6);
        var chSvg='<svg viewBox="0 0 300 85" style="width:100%;height:85px"><defs><linearGradient id="gdCt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" style="stop-color:var(--lk);stop-opacity:1"/><stop offset="100%" style="stop-color:var(--lk);stop-opacity:.4"/></linearGradient></defs>';
        ranked.forEach(function(st2,ri){var m2=memberMap[st2.user_id];if(!m2)return;var pp=totalDone>0?(st2.tasks_done||0)/totalDone:0;var bh3=Math.max(3,Math.round(pp*55));var bx=ri*xStep2+10+Math.round((xStep2-bW2)/2);var ctip=(m2.username?'@'+m2.username:'M'+(ri+1))+': '+Math.round(pp*100)+'% ('+( st2.tasks_done||0)+')';chSvg+='<rect class="svgb" x="'+bx+'" y="'+(62-bh3)+'" width="'+bW2+'" height="'+bh3+'" rx="4" fill="url(#gdCt)" style="animation-delay:'+(ri*0.1)+'s;cursor:pointer" onclick="showBarTooltip(event,\''+ctip.replace(/'/g,"\\'")+'\')"/><text x="'+(bx+bW2/2)+'" y="'+Math.max(12,55-bh3)+'" text-anchor="middle" font-size="9" fill="var(--tx)" font-weight="600">'+Math.round(pp*100)+'%</text>';if(ri<3)chSvg+='<text x="'+(bx+bW2/2)+'" y="'+Math.max(14,59-bh3)+'" text-anchor="middle" font-size="11">'+(ri===0?'🥇':ri===1?'🥈':'🥉')+'</text>';chSvg+='<text x="'+(bx+bW2/2)+'" y="79" text-anchor="middle" font-size="8" fill="var(--hn)">'+(m2.username?'@'+m2.username.slice(0,7):(L==="ru"?'М'+ri:'M'+ri))+'</text>';});
        chSvg+='</svg>';
        h+='<div class="st">'+(L==="ru"?"Вклад участников":"Contribution")+'</div><div class="cd" style="margin:0 0 8px"><div class="ci">'+chSvg+'</div></div>';
      }
      h+='<div class="st">'+(L==="ru"?"Участники":"Members")+'</div><div class="cd" style="margin:0 0 8px">';
      ranked.forEach(function(st,i){
        var m=memberMap[st.user_id];if(!m)return;
        var medal=medals[i]||'';
        var pct2b=totalDone>0?Math.round((st.tasks_done||0)/totalDone*100):0;
        h+='<div class="it" style="padding:10px 16px"><span style="font-size:20px;width:28px;text-align:center;flex-shrink:0">'+medal+'</span>';
        h+='<div class="ib"><div style="font-size:14px;font-weight:600">'+(m.username?'@'+m.username:'ID '+m.user_id)+(m.role==='creator'?' 👑':'')+'</div>';
        if(m.custom_role)h+='<div style="font-size:12px;color:var(--lk);font-weight:500">'+esc(m.custom_role)+'</div>';
        h+='<div style="font-size:12px;color:var(--hn)">'+(st.tasks_done||0)+' '+(L==="ru"?"выполнено":"done")+(totalDone>0?' · '+pct2b+'%':'')+'</div></div>';
        h+='<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">';
        if(st.user_id!==TG_UID)h+='<button onclick="sendEncouragement('+st.user_id+',\''+esc(g.title).replace(/'/g,"\\'")+'\')" style="background:none;border:1px solid var(--dv);border-radius:8px;padding:4px 8px;font-size:16px;cursor:pointer">💪</button>';
        if(st.user_id===TG_UID)h+='<button onclick="openEditRole('+goalId+','+TG_UID+',decodeURIComponent(\''+encodeURIComponent(m.custom_role||'')+'\'))" style="background:none;border:1px solid var(--dv);border-radius:8px;padding:4px 8px;font-size:13px;cursor:pointer;color:var(--hn)">✏️</button>';
        h+='</div></div>';
      });
      h+='</div>';
    }
    // Tasks
    h+='<div class="st">'+(L==="ru"?"Задачи":"Tasks")+'</div><div class="cd" style="margin:0 0 8px">';
    if(!tasks.length){h+='<div class="ci" style="text-align:center;color:var(--hn);font-size:14px">'+(L==="ru"?"Нет задач. Добавь первую!":"No tasks yet. Add the first one!")+'</div>';}
    tasks.forEach(function(t){
      var assignee=memberMap[t.assigned_to];
      h+='<div class="it"><button class="ck'+(t.done?' d':'')+'" onclick="toggleSharedTask('+t.id+','+goalId+')">'+(t.done?'✓':'')+'</button>';
      h+='<div class="ib"><div class="ix'+(t.done?' d':'')+'">'+esc(t.text)+'</div>';
      if(assignee||t.deadline){h+='<div style="font-size:12px;color:var(--hn);margin-top:2px">'+(assignee?'→ '+(assignee.username?'@'+assignee.username:'?'):'')+( assignee&&t.deadline?' · ':'')+( t.deadline?sgDlStr(t.deadline):'')+'</div>';}
      if(t.done){h+='<div style="display:flex;gap:4px;margin-top:4px">';['🔥','❤️','👏'].forEach(function(rx){h+='<button onclick="addSgReaction('+t.id+',\''+rx+'\')" style="background:none;border:1px solid var(--dv);border-radius:6px;padding:2px 6px;font-size:13px;cursor:pointer">'+rx+'</button>';});h+='</div>';}
      h+='</div></div>';
    });
    h+='</div>';
    // Action buttons
    h+='<button class="btn" style="margin-bottom:8px" onclick="openAddSharedTask('+goalId+')">'+(L==="ru"?"➕ Добавить задачу":"➕ Add task")+'</button>';
    h+='<button class="btg" style="margin-bottom:8px" onclick="showInviteCode(\''+g.invite_code+'\',\''+esc(g.title).replace(/'/g,"\\'")+'\')">'+(L==="ru"?"🔗 Пригласить":"🔗 Invite")+'</button>';
    if(isCreator){h+='<button class="btg" style="margin-bottom:8px;color:#ef4444" onclick="closeSharedGoal('+goalId+')">'+(L==="ru"?"🚫 Закрыть цель":"🚫 Close goal")+'</button>';}
    else{h+='<button class="btg" style="margin-bottom:8px;color:#ef4444" onclick="leaveSharedGoal('+goalId+')">'+(L==="ru"?"👋 Выйти из цели":"👋 Leave goal")+'</button>';}
    document.getElementById('sgDtlBody').innerHTML=h;
  }catch(e){document.getElementById('sgDtlBody').innerHTML='<div style="padding:32px;text-align:center;color:var(--hn)">'+esc(String(e))+'</div>';}
}

async function toggleSharedTask(taskId,goalId){
  try{
    var res=await sbCl.from('shared_tasks').select('done,text').eq('id',taskId).single();
    var newDone=!res.data.done;
    var upd={done:newDone};if(newDone)upd.done_at=new Date().toISOString();
    await sbCl.from('shared_tasks').update(upd).eq('id',taskId);
    if(newDone){
      var sRes=await sbCl.from('shared_stats').select('tasks_done').eq('goal_id',goalId).eq('user_id',TG_UID).single();
      if(sRes.data)await sbCl.from('shared_stats').update({tasks_done:(sRes.data.tasks_done||0)+1}).eq('goal_id',goalId).eq('user_id',TG_UID);
    }
    hap();await renderSharedDetail(goalId);
  }catch(e){}
}

async function saveSharedTask(){
  var text=document.getElementById('sgTaskTxt').value.trim();
  if(!text)return;
  var goalId=+document.getElementById('addTaskGoalId').value;
  var assignTo=document.getElementById('sgTaskAssign').value;
  var deadline=document.getElementById('sgTaskDl').value||null;
  try{
    await sbCl.from('shared_tasks').insert({goal_id:goalId,user_id:TG_UID,text:text,done:false,assigned_to:assignTo?+assignTo:null,deadline:deadline});
    var sRes=await sbCl.from('shared_stats').select('tasks_created').eq('goal_id',goalId).eq('user_id',TG_UID).single();
    if(sRes.data)await sbCl.from('shared_stats').update({tasks_created:(sRes.data.tasks_created||0)+1}).eq('goal_id',goalId).eq('user_id',TG_UID);
    X('addSharedTaskOv');hap('medium');await renderSharedDetail(goalId);
  }catch(e){try{TG.showAlert(L==="ru"?"Ошибка":"Error")}catch(e2){alert("Error")}}
}

async function sendEncouragement(toUserId,goalTitle){
  if(!TG_UID)return;
  var fromName=uName||'Кто-то';
  try{
    await fetch(SB_URL+'/rest/v1/encourage_queue',{method:'POST',headers:{apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({from_user_id:TG_UID,from_username:fromName,to_user_id:toUserId,goal_title:goalTitle,processed:false})});
    // Update stats
    var sRes=await sbCl.from('shared_stats').select('encouragements_sent').eq('user_id',TG_UID).single();
    if(sRes.data)await sbCl.from('shared_stats').update({encouragements_sent:(sRes.data.encouragements_sent||0)+1}).eq('user_id',TG_UID);
    hap('medium');
    try{TG.showAlert(L==="ru"?"💪 Подбодрение отправлено!":"💪 Encouragement sent!")}catch(e){alert(L==="ru"?"Отправлено!":"Sent!")}

}

async function showInviteCode(code,goalTitle){
  var inviteLink='https://t.me/IAM_app_bot?start=join_'+code;
  var inviteText='Присоединяйся к нашей совместной цели в IAM 🎯\n'+(goalTitle||'');

  if(navigator.share){try{await navigator.share({text:inviteText+'\n'+inviteLink});return;}catch(e){}}
  try{await navigator.clipboard.writeText(inviteLink);try{TG.showAlert('✅ Ссылка скопирована! Отправь другу в Telegram')}catch(e){alert('✅ Ссылка скопирована!')}}catch(e){alert('Ссылка: '+inviteLink)}
}
